#================================
# read https://mozilla.github.io/server-side-tls/ssl-config-generator/ for security guideline
# uncomment the line below to force https
Define UseHttps
Define APACHE_LOG_DIR /opt/lampp/apache2
Define WhiteList xielab|gdb13|UPCMLD|Help|stemcell|tussive|MM|allergy|IM|thrombosis|PC|CRC|DM|liver_fibrosis|PD|\.well-known|OP|g/|jenkins|downloads|Pain|5HT1A|smi2|ccgs|ad|bbb|cbid|cdar|cvd|FPR|hallucinogen|htdocking|pains|LiCABEDS|gpu|stemcellckb|tbi|targethunter|apoptosis|autophagy|dakb|pain|virus|pcdb|dockapi|panda|smartadapi|toxirural|ratlab

ServerAdmin liw30@pitt.edu
DocumentRoot /data/htdocs

AddType application/json .json
AddType video/mp4 .mp4

# log warnings and errors
LogLevel warn

# set log file path
ErrorLog ${APACHE_LOG_DIR}/error.log
CustomLog ${APACHE_LOG_DIR}/access.log common

# prevent site being embedded by iframes
Header append X-Frame-Options SAMEORIGIN

# remove headers
Header always unset X-Powered-By
Header unset X-Powered-By
ServerSignature Off
ServerTokens Prod

# enhance ssl security
SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
SSLCipherSuite ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-SHA384:ECDHE-RSA-AES256-SHA384:ECDHE-ECDSA-AES128-SHA256:ECDHE-RSA-AES128-SHA256
SSLHonorCipherOrder on
SSLCompression off

# OCSP Stapling
SSLUseStapling on
SSLStaplingResponderTimeout 5
SSLStaplingReturnResponderErrors off
SSLStaplingCache shmcb:/var/run/ocsp(128000)

# Added HTML replacing attributes
ProxyHTMLLinks div data-pollurl
ProxyHTMLLinks button data-url
ProxyHTMLLinks source src
ProxyHTMLLinks image xlink:href

# set the forwarded protocol header
RequestHeader set "X-Forwarded-Proto" expr=%{REQUEST_SCHEME}

# allow access to the entire site
<Directory "/">
    Require all granted
</Directory>

Alias /.well-known /data/acme/.well-known
<Directory "/.well-known">
    Require all granted
</Directory>

<IfDefine UseHttps>
    # match cbligand.org:80, redirect to www.cbligand.org:443
    <VirtualHost *:80>
        ServerName cbligand.org
        Redirect 301 / https://www.cbligand.org/
    </VirtualHost>

    # match cbligand.org:443, redirect to www.cbligand.org:443
    <VirtualHost *:443>
        ServerName cbligand.org
        Redirect 301 / https://www.cbligand.org/

        # config certificate for https
        SSLEngine On
        SSLCertificateFile /etc/letsencrypt/live/cbligand.org/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/cbligand.org/privkey.pem

        # add HSTS header (15768000 seconds = 6 months)
        Header Always Set Strict-Transport-Security "max-age=15768000"
    </VirtualHost>

    # match only www.cbligand.org:443
    <VirtualHost *:443>
        ServerName www.cbligand.org
        RedirectMatch 301 /pcdb? /g/pcdb
        RedirectMatch 301 /PCDB? /g/pcdb
        RedirectMatch 301 /dakb-gpcrs? /g/dakb-gpcrs
        RedirectMatch 301 /DAKB-GPCRS? /g/dakb-gpcrs
        RedirectMatch 301 /panda$ /panda/
        Redirect 301 /PANDA/ /panda/
        RedirectMatch 301 /dockapi$ /dockapi/
        Redirect 301 /DOCKAPI/ /dockapi/
        RedirectMatch 301 /[vV]irus-[cC][kK][bB] /g/virus-ckb
        RedirectMatch 301 /[pP]ain-[cC][kK][bB] /g/pain-ckb
        RedirectMatch 301 /CCGS/(BBB|AD|cbid|CDAR|StemCellCKB|hallucinogen|CVD|TargetHunter)\b/? /$1/

        # config certificate for https
        SSLEngine On
        SSLCertificateFile /etc/letsencrypt/live/cbligand.org/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/cbligand.org/privkey.pem

        # add HSTS header (15768000 seconds = 6 months)
        Header Always Set Strict-Transport-Security "max-age=15768000"

        # whitelist only some subpaths
        RewriteEngine On
        RewriteCond %{REQUEST_URI} !^/$
        RewriteCond %{REQUEST_URI} !^/(${WhiteList}) [NC]
        RewriteRule .* - [R=404,END]

        # prevent XSS scripting
        RewriteCond %{REQUEST_URI}%{QUERY_STRING} [<>'"*]|%3[ce]|%27 [NC,OR]
        RewriteCond %{QUERY_STRING} %2[25a] [NC,OR]
        RewriteCond %{REQUEST_URI} \.php/
        RewriteRule .* - [R=400,END]

        # rewrite protocol upgrade requests (GET with websocket header)
        RewriteCond %{REQUEST_URI} ^/dockapi/jobhub
        RewriteCond %{HTTP:Upgrade} websocket
        RewriteRule /dockapi/(.*) ws://localhost:5070/$1 [P,L]

        # disable access from internal
        ProxyRequests Off

        # send external host to internal
        ProxyPreserveHost On

        # match only locations with slash
        Define rppath dockapi
        Define rpport 5070
        <Location /${rppath}/>
            # forward requests to the internal host with the full path intact
            ProxyPass http://localhost:${rpport}/${rppath}/
            ProxyPassReverse http://localhost:${rpport}/${rppath}/

            # disable gzip, deflate or other encoding format in internal transmission
            RequestHeader unset Accept-Encoding
        </Location>

        # match only locations with slash
        Define rppath g
        Define rpport 5020
        <Location /${rppath}/>
            Redirect 301 /${rppath}/pck /${rppath}/pain-ckb

            # forward requests to the internal host with the full path intact
            ProxyPass http://localhost:${rpport}/${rppath}/
            ProxyPassReverse http://localhost:${rpport}/${rppath}/

            # disable gzip, deflate or other encoding format in internal transmission
            RequestHeader unset Accept-Encoding
        </Location>

        # match only locations with slash
        Define rppath panda
        Define rpport 5030
        <Location /${rppath}/>
            # forward requests to the internal host with the full path intact
            ProxyPass http://localhost:${rpport}/${rppath}/
            ProxyPassReverse http://localhost:${rpport}/${rppath}/

            # disable gzip, deflate or other encoding format in internal transmission
            RequestHeader unset Accept-Encoding
        </Location>

        # match only locations with slash
        Define rppath toxirural
        Define rpport 5050
        <Location /${rppath}/>
            # forward requests to the internal host with the full path intact
            ProxyPass http://localhost:${rpport}/${rppath}/
            ProxyPassReverse http://localhost:${rpport}/${rppath}/

            # disable gzip, deflate or other encoding format in internal transmission
            RequestHeader unset Accept-Encoding
        </Location>

        # match only locations with slash
        Define rppath ratlab
        Define rpport 5010
        <Location /${rppath}/>
            # forward requests to the internal host with the full path intact
            ProxyPass http://localhost:${rpport}/${rppath}/
            ProxyPassReverse http://localhost:${rpport}/${rppath}/

            # disable gzip, deflate or other encoding format in internal transmission
            RequestHeader unset Accept-Encoding
        </Location>

        # match only locations with slash
        Define rppath smartadapi
        Define rpport 5080
        <Location /${rppath}/>
            # forward requests to the internal host with the full path intact
            ProxyPass http://localhost:${rpport}/${rppath}/
            ProxyPassReverse http://localhost:${rpport}/${rppath}/

            # disable gzip, deflate or other encoding format in internal transmission
            RequestHeader unset Accept-Encoding
        </Location>

        # match only locations with slash
        Define rppath jenkins
        Define rpport 8080
        <Location /${rppath}/>
            # forward requests to the internal host with the full path intact
            ProxyPass http://localhost:${rpport}/${rppath}/ nocanon
            ProxyPassReverse http://localhost:${rpport}/${rppath}/

            # disable gzip, deflate or other encoding format in internal transmission
            RequestHeader unset Accept-Encoding
        </Location>
    </VirtualHost>
</IfDefine>

